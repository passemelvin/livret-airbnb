<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Affichette Frigo – A6</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      gap: 20px;
      font-family: 'Barlow', sans-serif;
      padding: 20px;
    }

    .page {
      width: 105mm;
      height: 148mm;
      background: #0d0d0d;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .racing-bg {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -55deg,
        transparent,
        transparent 18px,
        rgba(255,255,255,0.012) 18px,
        rgba(255,255,255,0.012) 20px
      );
    }

    /* Top banner */
    .top-banner {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 12mm;
      background: #00B140;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .top-banner::after {
      content: '';
      position: absolute;
      bottom: -6px; left: 0; right: 0;
      height: 6px;
      background: repeating-linear-gradient(
        90deg,
        #00B140 0px, #00B140 14px,
        #f5f5f5 14px, #f5f5f5 28px,
        #0d0d0d 28px, #0d0d0d 42px
      );
    }
    .banner-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      color: white;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    /* Bottom banner */
    .bottom-banner {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 10mm;
      background: #00B140;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .bottom-banner::before {
      content: '';
      position: absolute;
      top: -6px; left: 0; right: 0;
      height: 6px;
      background: repeating-linear-gradient(
        90deg,
        #0d0d0d 0px, #0d0d0d 14px,
        #f5f5f5 14px, #f5f5f5 28px,
        #00B140 28px, #00B140 42px
      );
    }
    .bottom-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 9px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 18mm 8mm 14mm;
      gap: 5mm;
    }

    .icon-big {
      font-size: 52px;
      line-height: 1;
      filter: drop-shadow(0 0 12px rgba(255,200,0,0.5));
    }

    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      color: #ffffff;
      letter-spacing: 3px;
      line-height: 0.95;
    }
    .headline span {
      color: #FFD600;
    }

    .warning-box {
      background: rgba(255, 214, 0, 0.08);
      border: 1.5px solid rgba(255, 214, 0, 0.5);
      border-radius: 6px;
      padding: 5mm 6mm;
      width: 100%;
    }
    .warning-text {
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      line-height: 1.6;
    }
    .warning-text strong {
      color: #FFD600;
      font-size: 14px;
      display: block;
      margin-bottom: 3px;
    }

    .sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .print-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      background: #00B140;
      color: white;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      padding: 12px 28px;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,177,64,0.4);
    }
    .print-btn:hover { background: #009933; }

    @page { size: A6; margin: 0; }

    @media print {
      body {
        background: #0d0d0d;
        margin: 0;
        padding: 0;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }
      .page {
        box-shadow: none;
        width: 105mm;
        height: 148mm;
      }
      .print-btn { display: none; }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="racing-bg"></div>

    <div class="top-banner">
      <span class="banner-title">Résidence Cervantes · Le Mans</span>
    </div>

    <div class="content">
      <div class="icon-big">🧊</div>

      <div class="headline">RÉFRIGÉRATEUR<br><span>ATTENTION</span></div>

      <div class="warning-box">
        <p class="warning-text">
          <strong>⚠️ La porte ferme mal</strong>
          Pensez à <strong style="color:#FFD600;display:inline;font-size:inherit">bien pousser la porte</strong> du réfrigérateur jusqu'au clic pour éviter que les aliments ne se réchauffent. Merci !
        </p>
      </div>

      <p class="sub">Résidence Cervantes · Appartement 42m²</p>
    </div>

    <div class="bottom-banner">
      <span class="bottom-text">Bon séjour au Mans 🏁</span>
    </div>
  </div>

  <button class="print-btn" onclick="window.print()">🖨️ Imprimer / PDF</button>

</body>
</html>
